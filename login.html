<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Cards | Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:#05060d;

overflow:hidden;

color:#fff;

}

/* Animated Background */

.bg1,.bg2,.bg3{

position:absolute;

border-radius:50%;

filter:blur(120px);

}

.bg1{

width:320px;
height:320px;
background:#6b2cff;
top:-120px;
left:-100px;

}

.bg2{

width:400px;
height:400px;
background:#0094ff;
right:-120px;
bottom:-120px;

}

.bg3{

width:260px;
height:260px;
background:#c400ff;
top:40%;
left:40%;

}

.login-box{

position:relative;

width:420px;

background:rgba(255,255,255,.06);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(25px);

border-radius:30px;

padding:40px;

box-shadow:0 0 60px rgba(111,80,255,.25);

z-index:5;

animation:float 5s ease-in-out infinite;

}

@keyframes float{

0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}

}

.logo{

text-align:center;

font-size:28px;

font-weight:700;

margin-bottom:30px;

}

.logo i{

color:#7c52ff;

margin-right:10px;

}

h2{

text-align:center;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#bdbdbd;

margin-bottom:30px;

}

.input-group{

margin-bottom:20px;

}

.input-group label{

display:block;

margin-bottom:8px;

font-size:14px;

}

.input{

position:relative;

}

.input input{

width:100%;

padding:16px 50px 16px 16px;

background:#13182a;

border:none;

border-radius:14px;

color:#fff;

font-size:15px;

outline:none;

}

.input i{

position:absolute;

right:18px;

top:18px;

color:#8c8c8c;

cursor:pointer;

}

.options{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:25px;

font-size:14px;

}

.options a{

color:#8b6cff;

text-decoration:none;

}

.login-btn{

width:100%;

padding:16px;

border:none;

border-radius:14px;

cursor:pointer;

font-size:16px;

font-weight:700;

background:linear-gradient(135deg,#6d32ff,#0095ff);

color:white;

box-shadow:0 0 30px rgba(111,80,255,.4);

transition:.3s;

}

.login-btn:hover{

transform:translateY(-3px);

}

.google{

margin-top:18px;

width:100%;

padding:16px;

border-radius:14px;

border:1px solid rgba(255,255,255,.1);

background:transparent;

color:white;

cursor:pointer;

}

.signup{

text-align:center;

margin-top:25px;

color:#bdbdbd;

}

.signup a{

color:#8b6cff;

text-decoration:none;

font-weight:600;

}

</style>

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>
<div class="bg3"></div>

<div class="login-box">

<div class="logo">
<i class="fa-solid fa-credit-card"></i>
Premium Cards
</div>

<h2>Welcome Back</h2>

<p class="subtitle">
Login to continue
</p>

<form id="loginForm">

<div class="input-group">

<label>Email</label>

<div class="input">

<input
type="email"
id="email"
placeholder="Enter Email">

<i class="fa-solid fa-envelope"></i>

</div>

</div>

<div class="input-group">

<label>Password</label>

<div class="input">

<input
type="password"
id="password"
placeholder="Enter Password">

<i id="eye"
class="fa-solid fa-eye"></i>

</div>

</div>

<div class="options">

<label>
<input type="checkbox">
Remember me
</label>

<a href="#">
Forgot Password?
</a>

</div>

<button class="login-btn">
Login
</button>

<button type="button" class="google">
<i class="fab fa-google"></i>
Continue with Google
</button>

<div class="signup">

Don't have an account?

<a href="signup.html">

Create Account

</a>

</div>

</form>

</div>

<script>

const eye=document.getElementById("eye");

const password=document.getElementById("password");

eye.onclick=function(){

if(password.type==="password"){

password.type="text";

eye.className="fa-solid fa-eye-slash";

}else{

password.type="password";

eye.className="fa-solid fa-eye";

}

}

<script type="module" src="login.js"></script>

</body>
</html>
